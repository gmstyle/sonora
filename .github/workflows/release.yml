name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true
          pub-cache: false

      - name: Cache Pub Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache/hosted
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - run: rm -rf ~/.pub-cache/git
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze
      - run: flutter test

  release:
    needs: validate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true
          pub-cache: false

      - name: Cache Pub Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache/hosted
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - run: rm -rf ~/.pub-cache/git
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs

      - name: Get App Version
        id: get_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          if [ -z "$VERSION" ]; then
            echo "ERROR: No version found in pubspec.yaml"
            exit 1
          fi
          APP_VERSION=$(echo "$VERSION" | cut -d'+' -f1)
          BUILD_NUMBER=$(echo "$VERSION" | cut -d'+' -f2)
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Check Version Not Already Released
        id: version_check
        run: |
          TAG="v${{ steps.get_version.outputs.APP_VERSION }}+${{ steps.get_version.outputs.BUILD_NUMBER }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists. Skipping release."
            echo "SKIP_RELEASE=true" >> "$GITHUB_OUTPUT"
          else
            echo "SKIP_RELEASE=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-java@v4
        if: steps.version_check.outputs.SKIP_RELEASE == 'false'
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android Keystore
        if: steps.version_check.outputs.SKIP_RELEASE == 'false'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks

          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      - name: Build Android APK
        if: steps.version_check.outputs.SKIP_RELEASE == 'false'
        run: |
          flutter build apk --release \
            --build-name=${{ steps.get_version.outputs.APP_VERSION }} \
            --build-number=${{ steps.get_version.outputs.BUILD_NUMBER }}

      - name: Install Linux Build Dependencies
        if: steps.version_check.outputs.SKIP_RELEASE == 'false'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libayatana-appindicator3-dev

      - name: Build Linux
        if: steps.version_check.outputs.SKIP_RELEASE == 'false'
        run: flutter build linux --release

      - name: Package Linux Bundle
        if: steps.version_check.outputs.SKIP_RELEASE == 'false'
        run: |
          BUNDLE="build/linux/x64/release/bundle"
          OUTDIR="sonora-linux-x64"
          mkdir -p "$OUTDIR"

          cp -r "$BUNDLE"/* "$OUTDIR/"
          cp assets/logo_full.png "$OUTDIR/sonora.png"
          # Copy and optionally downscale tray icon (system trays expect small icons)
          cp assets/icons/tray/tray_icon.png "$OUTDIR/tray_icon.png"
          if command -v convert &>/dev/null; then
            convert "$OUTDIR/tray_icon.png" -resize 48x48 "$OUTDIR/tray_icon.png"
          fi

          cat > "$OUTDIR/com.gmstyle.sonora.desktop" << 'DESKTOP'
          [Desktop Entry]
          Name=Sonora
          Comment=A music streaming app powered by YouTube Music
          Exec=sonora
          Icon=/opt/sonora/sonora.png
          Terminal=false
          Type=Application
          Categories=Audio;Music;Player;
          StartupWMClass=com.gmstyle.sonora
          DESKTOP

          cat > "$OUTDIR/install.sh" << 'INSTALL'
          #!/bin/bash
          set -e

          INSTALL_DIR="/opt/sonora"

          sudo mkdir -p "$INSTALL_DIR"
          sudo cp -r "$(dirname "$0")"/* "$INSTALL_DIR/"
          sudo chmod +x "$INSTALL_DIR/sonora"

          mkdir -p "$HOME/.local/share/applications"
          sed "s|Exec=sonora|Exec=$INSTALL_DIR/sonora|" "$INSTALL_DIR/com.gmstyle.sonora.desktop" > "$HOME/.local/share/applications/com.gmstyle.sonora.desktop"

          # Install icon to standard XDG paths so it's found by launcher/taskbar
          for SIZE in 48 64 128 256; do
            mkdir -p "$HOME/.local/share/icons/hicolor/${SIZE}x${SIZE}/apps"
            if command -v convert &>/dev/null; then
              convert "$INSTALL_DIR/sonora.png" -resize "${SIZE}x${SIZE}" \
                "$HOME/.local/share/icons/hicolor/${SIZE}x${SIZE}/apps/sonora.png"
            else
              cp "$INSTALL_DIR/sonora.png" "$HOME/.local/share/icons/hicolor/${SIZE}x${SIZE}/apps/sonora.png"
            fi
          done
          gtk-update-icon-cache "$HOME/.local/share/icons/hicolor/" 2>/dev/null || true

          update-desktop-database "$HOME/.local/share/applications/" 2>/dev/null || true

          echo "Sonora installed! Run: $INSTALL_DIR/sonora"
          INSTALL

          cat > "$OUTDIR/uninstall.sh" << 'UNINSTALL'
          #!/bin/bash
          set -e

          INSTALL_DIR="/opt/sonora"

          echo "Removing Sonora..."

          # Remove installation directory
          if [ -d "$INSTALL_DIR" ]; then
            sudo rm -rf "$INSTALL_DIR"
          fi

          # Remove desktop entry
          rm -f "$HOME/.local/share/applications/com.gmstyle.sonora.desktop"

          # Remove icons
          for SIZE in 48 64 128 256; do
            rm -f "$HOME/.local/share/icons/hicolor/${SIZE}x${SIZE}/apps/sonora.png"
          done
          gtk-update-icon-cache "$HOME/.local/share/icons/hicolor/" 2>/dev/null || true

          update-desktop-database "$HOME/.local/share/applications/" 2>/dev/null || true

          echo "Sonora uninstalled."
          UNINSTALL

          chmod +x "$OUTDIR/install.sh"
          chmod +x "$OUTDIR/uninstall.sh"
          tar czf sonora-linux-x64.tar.gz "$OUTDIR"/

      - name: Install Packaging Dependencies
        if: steps.version_check.outputs.SKIP_RELEASE == 'false'
        run: |
          sudo apt-get install -y ruby ruby-dev build-essential rpm
          sudo gem install fpm
          fpm --version

      - name: Build Linux DEB + RPM Packages
        if: steps.version_check.outputs.SKIP_RELEASE == 'false'
        run: bash packaging/linux/build-packages.sh --format all --skip-build

      - name: Create GitHub Release
        if: steps.version_check.outputs.SKIP_RELEASE == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.APP_VERSION }}+${{ steps.get_version.outputs.BUILD_NUMBER }}
          name: Release v${{ steps.get_version.outputs.APP_VERSION }} (${{ steps.get_version.outputs.BUILD_NUMBER }})
          generate_release_notes: true
          body: |
            **Version:** ${{ steps.get_version.outputs.APP_VERSION }}
            **Build:** ${{ steps.get_version.outputs.BUILD_NUMBER }}

            ---

            ## Downloads
            - **Android APK**: attached below
            - **Linux tar.gz** (portable): `sonora-linux-x64.tar.gz` attached below
            - **Linux DEB** (Debian/Ubuntu): attached below
            - **Linux RPM** (Fedora/RHEL): attached below
          files: |
            build/app/outputs/flutter-apk/*.apk
            sonora-linux-x64.tar.gz
            build/packages/*.deb
            build/packages/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}