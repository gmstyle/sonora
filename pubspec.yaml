name: sonora
description: A music streaming app.
version: 1.3.3+22
publish_to: none

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── Core Utilities ────────────────────────────────────────────
  path: ^1.9.0
  args: ^2.7.0

  # ── YTMusic Data Layer ────────────────────────────────────────
  # dart_ytmusic_api:
  #  path: ../dart_ytmusic_api
  # dovrà usare il git mio di dart_ytmusic_api, ma per ora uso questo per lo sviluppo
  dart_ytmusic_api:
    git:
      url: https://github.com/gmstyle/dart_ytmusic_api.git
  youtube_explode_dart: ^3.1.0

  # ── Audio Playback ────────────────────────────────────────────
  audio_session: ^0.2.3
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  audio_service: ^0.18.18
  audio_service_platform_interface: ^0.1.3
  audio_service_mpris: ^0.2.1

  # ── Linux Desktop ────────────────────────────────────────────
  tray_manager: ^0.5.2
  window_manager: any

  # ── State Management ──────────────────────────────────────────
  flutter_riverpod: ^3.3.1
  collection: ^1.19.1

  # ── Navigation ────────────────────────────────────────────────
  go_router: ^17.2.3

  # ── Local Database ────────────────────────────────────────────
  drift: ^2.33.0
  drift_flutter: ^0.3.0

  # ── File System & Permissions ─────────────────────────────────
  path_provider: ^2.1.6
  permission_handler: ^12.0.1

  # ── Download ─────────────────────────────────────────────────
  dio: ^5.9.2
  connectivity_plus: ^7.1.1 

  # ── Images ──────────────────────────────────────────────────
  cached_network_image: ^3.4.1
  flutter_svg: ^2.3.0

  # ── Sharing ───────────────────────────────────────────────────
  share_plus: ^12.0.2

  # ── App Info & Update Check ───────────────────────────────────
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.1
  

  # ── UI-UX ────────────────────────────────────────────────────────
  shimmer: ^3.0.0
  dynamic_color: ^1.8.1
  marquee: ^2.3.0
  palette_generator_master: ^1.1.0
  google_fonts: ^8.1.0
  lucide_icons_flutter: ^3.1.14+2

  # ── Settings ─────────────────────────────────────────────────
  shared_preferences: ^2.5.3
  disable_battery_optimization: ^1.1.2

  # ── Localizzazione ────────────────────────────────────────────
  intl: ^0.20.2

  # ── Backup ──────────────────────────────────────
  archive: ^4.0.9

  # ── File Picker ──────────────────────────────────────────────
  file_picker: ^11.0.2

  # ── Notifications ────────────────────────────────────────────────
  flutter_local_notifications: ^22.0.1
  flutter_local_notifications_linux: ^8.0.1
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.33.0
  build_runner: ^2.4.15
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/

flutter_launcher_icons:
  android: "ic_launcher"
  # Questa immagine viene usata per i vecchi Android (< 8.0). Usa l'SVG completo.
  image_path_android: "assets/logo_full.png" 
  
  # Per Android moderni (Adaptive Icons)
  # Usiamo il colore scuro del tuo brand per lo sfondo
  adaptive_icon_background: "#131429" 
  adaptive_icon_foreground: "assets/logo_foreground.png" 

flutter_native_splash:
  color: "#131429" # Allineato al colore del brand
  image: assets/logo_full.png # Qui l'SVG completo va benissimo perché è centrato con gravity
  android: true
  android_gravity: center
  fullscreen: true
